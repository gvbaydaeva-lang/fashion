# Статический лендинг: index.html + медиа (без Next.js).
# В артефакт: index.html (копия elista), IMG_5690.MP4, assets/*.png, .nojekyll
#
# Settings → Pages → Build and deployment → Source: GitHub Actions
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble static site (exact HTML + media)
        run: |
          set -euo pipefail
          mkdir -p site/assets
          cp "elista_fashion_show_landing_video_in_50.html" "site/index.html"
          cp "public/media/IMG_5690.MP4" "site/IMG_5690.MP4"
          cp -R assets/. site/assets/
          touch "site/.nojekyll"
          cmp -s "elista_fashion_show_landing_video_in_50.html" "site/index.html"

      - name: Verify landing index.html (not README, not Next)
        run: |
          set -euo pipefail
          test -f site/index.html
          grep -q "ELISTA FASHION SHOW 2026" site/index.html
          grep -q 'src="IMG_5690.MP4"' site/index.html
          grep -q 'assets/hero-editorial.png' site/index.html
          ! grep -q "_next" site/index.html || (echo "ERROR: Next.js output leaked into index.html" && exit 1)
          ! grep -qi "<!-- readme" site/index.html || true

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

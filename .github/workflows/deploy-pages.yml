# Публикация содержимого папки `out/` в GitHub Pages.
#
# Обязательно: Settings → Pages → Build and deployment → Source: GitHub Actions
# (не «Deploy from a branch» — иначе будет показываться README из корня репозитория).
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export (output: out/)
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://gvbaydaeva-lang.github.io/fashion

      - name: Verify index.html
        run: test -f out/index.html && ls -la out/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
